			var path = window.location.pathname;

			var contextRoot = path.slice(firstSlashPosition,secondSlashPosition); 

			var appPath = 'http://' + window.location.host + contextRoot; 
		
			valor = url.substring(0,4); 

			if (valor=='java') 
			{
			  eval(url);
			  return;
			}
			if (valor != 'http' ) 
						{pref=appPath;} 
				   else {pref='' ;} 
			
			
			location.href=pref+url;
			}
