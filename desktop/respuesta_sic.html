<SCRIPT>
	function contextRoot (){
			 var path = window.location.pathname;
	         var firstSlashPosition = 0;
	         var secondSlashPosition = path.indexOf('/',1);
	         return path.slice(firstSlashPosition,secondSlashPosition);
	}
	
	function botonVolver() {
			if (window.history.length == 0){
				window.close();
			}else {			
				jsVolver = 	"/Logout";
				if (jsVolver == "cerrarVentana"){
					window.close();
				}else{
					if (jsVolver!=""){
			  			parent.location= contextRoot() + jsVolver ;
				 	}else {
					 	parent.location= contextRoot() + "/jsp/index.jsp" ;
				 	}
				}				 	
			 }
			 	
	}
	
	function goBack() {
		
		parent.location= document.referrer;
	}	
</SCRIPT>
<script> 
history.go(+1);

	function focoInicial(){
		document.forms[0].rol.focus();
	}
	
	function TabNext(){			
		document.forms[0].elements["submitir"].focus();	
	}
	
	function esZona(){	
		var elRol =  document.forms[0].elements["rol"].value;
		if(elRol =='Zona' || elRol =='ZonaModificacion'){
			document.getElementById('zonas').style ="";
		}else{
			document.getElementById('zonas').style ="display:none"
		}
		
	};
</script>
